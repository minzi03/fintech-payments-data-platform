name: fintech-payments-data-platform

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-fintech-payments-airflow:3.3.0}
  build:
    context: .
    dockerfile: infrastructure/airflow/Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment: &airflow-common-environment
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY must be set}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_TIMEZONE:-UTC}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USER:-platform-admin}:admin
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "false"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/logs/simple_auth_passwords.json
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY must be set}
    # yamllint disable-line rule:line-length
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DATABASE_USER:?AIRFLOW_DATABASE_USER must be set}:${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD must be set}@airflow-postgres:5432/${AIRFLOW_DATABASE_NAME:?AIRFLOW_DATABASE_NAME must be set}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # yamllint disable-line rule:line-length
    AIRFLOW_CONN_CONTROL_DB: postgresql://${CONTROL_DATABASE_USER:?CONTROL_DATABASE_USER must be set}:${CONTROL_DATABASE_PASSWORD:?CONTROL_DATABASE_PASSWORD must be set}@airflow-postgres:5432/${AIRFLOW_DATABASE_NAME:?AIRFLOW_DATABASE_NAME must be set}
    AIRFLOW_TIMEZONE: ${AIRFLOW_TIMEZONE:-UTC}
    AIRFLOW_SETTLEMENT_SCHEDULE: ${AIRFLOW_SETTLEMENT_SCHEDULE:-0 1 * * *}
    AIRFLOW_CDC_HEALTH_SCHEDULE: ${AIRFLOW_CDC_HEALTH_SCHEDULE:-*/5 * * * *}
    AIRFLOW_SILVER_SCHEDULE: ${AIRFLOW_SILVER_SCHEDULE:-*/15 * * * *}
    AIRFLOW_TASK_RETRIES: ${AIRFLOW_TASK_RETRIES:-2}
    AIRFLOW_RETRY_DELAY_SECONDS: ${AIRFLOW_RETRY_DELAY_SECONDS:-60}
    AIRFLOW_TASK_TIMEOUT_SECONDS: ${AIRFLOW_TASK_TIMEOUT_SECONDS:-1800}
    SETTLEMENT_REJECTION_WARN_RATE: ${SETTLEMENT_REJECTION_WARN_RATE:-0.01}
    SETTLEMENT_REJECTION_FAIL_RATE: ${SETTLEMENT_REJECTION_FAIL_RATE:-0.05}
    SILVER_REJECTION_WARN_RATE: ${SILVER_REJECTION_WARN_RATE:-0.01}
    SILVER_REJECTION_FAIL_RATE: ${SILVER_REJECTION_FAIL_RATE:-0.05}
    CDC_LAG_WARN_THRESHOLD: ${CDC_LAG_WARN_THRESHOLD:-1000}
    CDC_LAG_FAIL_THRESHOLD: ${CDC_LAG_FAIL_THRESHOLD:-10000}
    CDC_FRESHNESS_WARN_SECONDS: ${CDC_FRESHNESS_WARN_SECONDS:-120}
    CDC_FRESHNESS_FAIL_SECONDS: ${CDC_FRESHNESS_FAIL_SECONDS:-600}
    # yamllint disable-line rule:line-length
    DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_CONNECT_URL: http://kafka-connect:8083
    DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME:-payments-postgres-cdc}
    CDC_CONSUMER_GROUP_ID: ${CDC_CONSUMER_GROUP_ID:-fintech-cdc-bronze-v1}
    CDC_CONSUMER_TOPICS: ${CDC_CONSUMER_TOPICS:?CDC_CONSUMER_TOPICS must be set}
    CDC_CONSUMER_MANIFEST_DB: /opt/airflow/project/data/cdc-consumer/cdc_consumer_manifest.sqlite3
    STORAGE_BACKEND: minio
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    MINIO_SECURE: ${MINIO_SECURE:-false}
    MINIO_REGION: ${MINIO_REGION:-us-east-1}
    MINIO_BRONZE_BUCKET: ${MINIO_BRONZE_BUCKET:-fintech-bronze}
    MINIO_QUARANTINE_BUCKET: ${MINIO_QUARANTINE_BUCKET:-fintech-quarantine}
    MINIO_SILVER_BUCKET: ${MINIO_SILVER_BUCKET:-fintech-silver}
    MINIO_CONNECT_TIMEOUT_SECONDS: ${MINIO_CONNECT_TIMEOUT_SECONDS:-5}
    MINIO_READ_TIMEOUT_SECONDS: ${MINIO_READ_TIMEOUT_SECONDS:-30}
    MINIO_MAX_RETRIES: ${MINIO_MAX_RETRIES:-3}
    SETTLEMENT_INBOUND_DIR: /opt/airflow/project/data/inbound/settlements
    SETTLEMENT_PARTNER_ID: ${SETTLEMENT_PARTNER_ID:-VCB}
    SETTLEMENT_MANIFEST_DB: /opt/airflow/project/data/control/settlement_manifest.sqlite3
    SILVER_LOCAL_ROOT: /opt/airflow/project/data/silver
    SILVER_MANIFEST_DB: /opt/airflow/project/data/control/silver_manifest.sqlite3
    SILVER_TEMP_DIR: /opt/airflow/project/data/tmp/silver
    SILVER_CODE_VERSION: ${SILVER_CODE_VERSION:-phase6-v1}
    SILVER_SCHEMA_VERSION: ${SILVER_SCHEMA_VERSION:-silver-v1}
    SILVER_SUPPORTED_CDC_SCHEMA: ${SILVER_SUPPORTED_CDC_SCHEMA:-cdc-bronze-v1}
    SILVER_SETTLEMENT_CONTRACT: /opt/airflow/project/contracts/batch/settlement_v1.yml
    SILVER_MAX_OBJECTS: ${SILVER_MAX_OBJECTS:-100}
    PYTHONPATH: /opt/airflow/project/src
  volumes: &airflow-common-volumes
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./data/inbound:/opt/airflow/project/data/inbound
    - airflow_logs:/opt/airflow/logs
    - airflow_component_state:/opt/airflow/project/data/control
    - airflow_tmp:/opt/airflow/project/data/tmp
    - cdc_consumer_state:/opt/airflow/project/data/cdc-consumer:ro
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  portal-api:
    build:
      context: .
      dockerfile: apps/portal-api/Dockerfile
      args:
        PORTAL_API_VERSION: ${PORTAL_API_SERVICE_VERSION:-0.1.0-dev}
        PORTAL_API_BUILD_SHA: ${PORTAL_API_BUILD_SHA:-local}
        PORTAL_API_BUILD_TIME: ${PORTAL_API_BUILD_TIME:-local}
    restart: unless-stopped
    environment:
      PORTAL_API_ENVIRONMENT: ${PORTAL_API_ENVIRONMENT:-local}
      PORTAL_API_SERVICE_VERSION: ${PORTAL_API_SERVICE_VERSION:-0.1.0-dev}
      PORTAL_API_API_VERSION: ${PORTAL_API_API_VERSION:-v1}
      PORTAL_API_CONTRACT_VERSION: ${PORTAL_API_CONTRACT_VERSION:-1.0.0}
      PORTAL_API_DOCUMENTATION_VERSION: ${PORTAL_API_DOCUMENTATION_VERSION:-portal-foundation-v1}
      PORTAL_API_BUILD_SHA: ${PORTAL_API_BUILD_SHA:-local}
      PORTAL_API_BUILD_TIME: ${PORTAL_API_BUILD_TIME:-local}
      PORTAL_API_LOG_LEVEL: ${PORTAL_API_LOG_LEVEL:-INFO}
      PORTAL_API_LOG_FORMAT: ${PORTAL_API_LOG_FORMAT:-console}
      PORTAL_API_HOST: 0.0.0.0
      PORTAL_API_PORT: 8010
      PORTAL_API_ALLOWED_ORIGINS: ${PORTAL_API_ALLOWED_ORIGINS:-http://localhost:3000}
      PORTAL_API_TRUSTED_HOSTS: ${PORTAL_API_TRUSTED_HOSTS:-localhost,127.0.0.1,portal-api}
      PORTAL_API_DEPENDENCY_TIMEOUT_SECONDS: ${PORTAL_API_DEPENDENCY_TIMEOUT_SECONDS:-2}
      PORTAL_API_READINESS_TIMEOUT_SECONDS: ${PORTAL_API_READINESS_TIMEOUT_SECONDS:-5}
      PORTAL_API_HEALTH_CACHE_TTL_SECONDS: ${PORTAL_API_HEALTH_CACHE_TTL_SECONDS:-2}
      PORTAL_API_TELEMETRY_ENABLED: ${PORTAL_API_TELEMETRY_ENABLED:-false}
      PORTAL_API_OPENAPI_ENABLED: ${PORTAL_API_OPENAPI_ENABLED:-true}
      PORTAL_API_DEVELOPMENT_IDENTITY_ENABLED: "false"
    ports:
      - "127.0.0.1:${PORTAL_API_PORT:-8010}:8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8010/health/live', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    cpus: 0.50

  portal-web:
    build:
      context: .
      dockerfile: apps/portal-web/Dockerfile
      args:
        PORTAL_WEB_VERSION: ${NEXT_PUBLIC_PORTAL_WEB_VERSION:-0.1.0-dev}
        PORTAL_BUILD_SHA: ${NEXT_PUBLIC_PORTAL_BUILD_SHA:-local}
        PORTAL_ENV: ${NEXT_PUBLIC_PORTAL_ENV:-local}
        PORTAL_API_INTERNAL_URL: http://portal-api:8010
    restart: unless-stopped
    depends_on:
      portal-api:
        condition: service_healthy
    environment:
      PORTAL_API_INTERNAL_URL: http://portal-api:8010
    ports:
      - "127.0.0.1:${PORTAL_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/health')
          .then(response => { if (!response.ok) process.exit(1) })
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 384m
    cpus: 0.75

  postgres:
    image: postgres:16.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=${POSTGRES_MAX_REPLICATION_SLOTS:-10}
      - -c
      - max_wal_senders=${POSTGRES_MAX_WAL_SENDERS:-10}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BRONZE_BUCKET: ${MINIO_BRONZE_BUCKET:-fintech-bronze}
      MINIO_QUARANTINE_BUCKET: ${MINIO_QUARANTINE_BUCKET:-fintech-quarantine}
      MINIO_SILVER_BUCKET: ${MINIO_SILVER_BUCKET:-fintech-silver}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}" &&
        mc mb --ignore-existing --region "$${MINIO_REGION}" "local/$${MINIO_BRONZE_BUCKET}" &&
        mc mb --ignore-existing --region "$${MINIO_REGION}" "local/$${MINIO_QUARANTINE_BUCKET}" &&
        mc mb --ignore-existing --region "$${MINIO_REGION}" "local/$${MINIO_SILVER_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_BRONZE_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_QUARANTINE_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_SILVER_BUCKET}"

  kafka:
    image: apache/kafka:4.3.1
    hostname: kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID must be set}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_LOG_RETENTION_MS: ${KAFKA_RETENTION_MS:-604800000}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  kafka-connect:
    image: quay.io/debezium/connect:3.6.0.Final
    hostname: kafka-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: fintech-payments-connect
      CONFIG_STORAGE_TOPIC: fintech.connect.configs
      OFFSET_STORAGE_TOPIC: fintech.connect.offsets
      STATUS_STORAGE_TOPIC: fintech.connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      REST_ADVERTISED_HOST_NAME: kafka-connect
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8083/connector-plugins >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  connector-init:
    build:
      context: ./infrastructure/debezium
      dockerfile: connector-init.Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      KAFKA_TOPIC_PREFIX: ${KAFKA_TOPIC_PREFIX:-fintech.cdc}
      KAFKA_DEFAULT_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_RETENTION_MS: ${KAFKA_RETENTION_MS:-604800000}
      DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME:-payments-postgres-cdc}
      DEBEZIUM_SLOT_NAME: ${DEBEZIUM_SLOT_NAME:-fintech_payments_cdc_slot}
      DEBEZIUM_PUBLICATION_NAME: ${DEBEZIUM_PUBLICATION_NAME:-fintech_payments_cdc_publication}
      DEBEZIUM_DATABASE_HOST: postgres
      DEBEZIUM_DATABASE_PORT: 5432
      DEBEZIUM_DATABASE_NAME: ${DEBEZIUM_DATABASE_NAME:-fintech_payments}
      DEBEZIUM_DATABASE_USER: ${DEBEZIUM_DATABASE_USER:-payments_cdc}
      DEBEZIUM_DATABASE_PASSWORD: ${DEBEZIUM_DATABASE_PASSWORD:?DEBEZIUM_DATABASE_PASSWORD must be set}
      DEBEZIUM_HEARTBEAT_INTERVAL_MS: ${DEBEZIUM_HEARTBEAT_INTERVAL_MS:-10000}
      DEBEZIUM_SNAPSHOT_MODE: ${DEBEZIUM_SNAPSHOT_MODE:-initial}
      CDC_HTTP_TIMEOUT_SECONDS: ${CDC_HTTP_TIMEOUT_SECONDS:-10}
      CDC_HTTP_MAX_ATTEMPTS: ${CDC_HTTP_MAX_ATTEMPTS:-10}
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./infrastructure/debezium/connectors:/app/connectors:ro
    command:
      - /bin/sh
      - -c
      - >-
        python scripts/cdc/bootstrap_postgres.py &&
        python scripts/cdc/register_connector.py
        --template /app/connectors/payments-postgres.json --wait-running

  cdc-consumer:
    profiles:
      - cdc-consumer
    build:
      context: .
      dockerfile: infrastructure/cdc-consumer/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      connector-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BRONZE_BUCKET: ${MINIO_BRONZE_BUCKET:-fintech-bronze}
      MINIO_QUARANTINE_BUCKET: ${MINIO_QUARANTINE_BUCKET:-fintech-quarantine}
      MINIO_CONNECT_TIMEOUT_SECONDS: ${MINIO_CONNECT_TIMEOUT_SECONDS:-5}
      MINIO_READ_TIMEOUT_SECONDS: ${MINIO_READ_TIMEOUT_SECONDS:-30}
      MINIO_MAX_RETRIES: ${MINIO_MAX_RETRIES:-3}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ${KAFKA_TOPIC_PREFIX:-fintech.cdc}
      CDC_CONSUMER_GROUP_ID: ${CDC_CONSUMER_GROUP_ID:-fintech-cdc-bronze-v1}
      CDC_CONSUMER_CLIENT_ID: ${CDC_CONSUMER_CLIENT_ID:-fintech-cdc-bronze-consumer}
      CDC_CONSUMER_TOPICS: ${CDC_CONSUMER_TOPICS:?CDC_CONSUMER_TOPICS must be set}
      CDC_CONSUMER_AUTO_OFFSET_RESET: ${CDC_CONSUMER_AUTO_OFFSET_RESET:-earliest}
      CDC_CONSUMER_BATCH_SIZE: ${CDC_CONSUMER_BATCH_SIZE:-100}
      CDC_CONSUMER_FLUSH_INTERVAL_SECONDS: ${CDC_CONSUMER_FLUSH_INTERVAL_SECONDS:-5}
      CDC_CONSUMER_POLL_TIMEOUT_MS: ${CDC_CONSUMER_POLL_TIMEOUT_MS:-1000}
      CDC_CONSUMER_MAX_POLL_INTERVAL_MS: ${CDC_CONSUMER_MAX_POLL_INTERVAL_MS:-300000}
      CDC_CONSUMER_SESSION_TIMEOUT_MS: ${CDC_CONSUMER_SESSION_TIMEOUT_MS:-45000}
      CDC_CONSUMER_HEARTBEAT_INTERVAL_MS: ${CDC_CONSUMER_HEARTBEAT_INTERVAL_MS:-15000}
      CDC_CONSUMER_MAX_RETRIES: ${CDC_CONSUMER_MAX_RETRIES:-3}
      CDC_CONSUMER_RETRY_BACKOFF_SECONDS: ${CDC_CONSUMER_RETRY_BACKOFF_SECONDS:-0.5}
      CDC_DLQ_TOPIC: ${CDC_DLQ_TOPIC:-fintech.cdc.dlq}
      CDC_BRONZE_BUCKET: ${CDC_BRONZE_BUCKET:-fintech-bronze}
      CDC_QUARANTINE_BUCKET: ${CDC_QUARANTINE_BUCKET:-fintech-quarantine}
      CDC_SCHEMA_VERSION: ${CDC_SCHEMA_VERSION:-cdc-bronze-v1}
      CDC_CONSUMER_MANIFEST_DB: /app/data/control/cdc_consumer_manifest.sqlite3
      CDC_CONSUMER_TEMP_DIR: /app/data/tmp/cdc_consumer
      CDC_CONSUMER_SHUTDOWN_TIMEOUT_SECONDS: ${CDC_CONSUMER_SHUTDOWN_TIMEOUT_SECONDS:-30}
    volumes:
      - cdc_consumer_state:/app/data/control
      - cdc_consumer_tmp:/app/data/tmp

  airflow-postgres:
    image: postgres:16.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_DATABASE_NAME:?AIRFLOW_DATABASE_NAME must be set}
      POSTGRES_USER: ${AIRFLOW_DATABASE_USER:?AIRFLOW_DATABASE_USER must be set}
      POSTGRES_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD must be set}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    entrypoint:
      - /bin/bash
      - -c
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-environment
      AIRFLOW_DATABASE_HOST: airflow-postgres
      AIRFLOW_DATABASE_PORT: 5432
      AIRFLOW_DATABASE_NAME: ${AIRFLOW_DATABASE_NAME:?AIRFLOW_DATABASE_NAME must be set}
      AIRFLOW_DATABASE_USER: ${AIRFLOW_DATABASE_USER:?AIRFLOW_DATABASE_USER must be set}
      AIRFLOW_DATABASE_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD must be set}
      CONTROL_DATABASE_USER: ${CONTROL_DATABASE_USER:?CONTROL_DATABASE_USER must be set}
      CONTROL_DATABASE_PASSWORD: ${CONTROL_DATABASE_PASSWORD:?CONTROL_DATABASE_PASSWORD must be set}
      AIRFLOW_UID_VALUE: ${AIRFLOW_UID:-50000}
    command:
      - |
        chown -R "$${AIRFLOW_UID_VALUE}:0" \
          /opt/airflow/logs \
          /opt/airflow/project/data/control \
          /opt/airflow/project/data/tmp
        chmod -R g+rwX \
          /opt/airflow/logs \
          /opt/airflow/project/data/control \
          /opt/airflow/project/data/tmp
        export HOME=/home/airflow
        exec setpriv \
          --reuid="$${AIRFLOW_UID_VALUE}" \
          --regid=0 \
          --clear-groups \
          bash -c 'airflow db migrate && python /opt/airflow/project/scripts/airflow/bootstrap_control.py'

  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    command:
      - api-server
    ports:
      - "127.0.0.1:${AIRFLOW_WEB_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8080/api/v2/monitor/health >/dev/null
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    command:
      - scheduler
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  airflow-dag-processor:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    command:
      - dag-processor
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
    name: fintech-payments-postgres-data
  minio_data:
    name: fintech-payments-minio-data
  kafka_data:
    name: fintech-payments-kafka-data
  cdc_consumer_state:
    name: fintech-payments-cdc-consumer-state
  cdc_consumer_tmp:
    name: fintech-payments-cdc-consumer-tmp
  airflow_postgres_data:
    name: fintech-payments-airflow-postgres-data
  airflow_logs:
    name: fintech-payments-airflow-logs
  airflow_component_state:
    name: fintech-payments-airflow-component-state
  airflow_tmp:
    name: fintech-payments-airflow-tmp
