name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Phase 6 quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Python formatting
        run: python -m ruff format --check .

      - name: Run unit, local batch, CDC consumer, and Silver tests with coverage
        run: >-
          python -m pytest -m "not integration or batch_integration"
          --cov=src --cov-report=term-missing --cov-report=xml

      - name: Validate YAML
        run: python -m yamllint .

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet

  minio-integration:
    name: MinIO and Silver integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start MinIO and bootstrap private buckets
        run: |
          docker compose --env-file .env.example up -d --wait minio
          docker compose --env-file .env.example up minio-init

      - name: Run MinIO integration tests
        run: |
          set -a
          source .env.example
          set +a
          RUN_MINIO_INTEGRATION=1 python -m pytest -m minio_integration

      - name: Run Silver integration tests
        run: |
          set -a
          source .env.example
          set +a
          RUN_SILVER_INTEGRATION=1 python -m pytest -m silver_integration

      - name: Stop MinIO
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans
