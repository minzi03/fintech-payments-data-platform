name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portal-quality:
    name: Portal contract, API, and Web quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: pnpm

      - name: Install Portal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/portal-api[dev]"
          pnpm install --frozen-lockfile

      - name: Validate Portal API
        run: |
          python -m ruff check apps/portal-api
          python -m ruff format --check apps/portal-api
          python -m mypy --config-file apps/portal-api/pyproject.toml
          python -m pytest -c apps/portal-api/pyproject.toml apps/portal-api/tests

      - name: Detect generated contract drift
        run: |
          PYTHONPATH=apps/portal-api/app \
            python apps/portal-api/scripts/generate_openapi.py \
            --output packages/portal-contracts/openapi/portal-api-v1.json
          pnpm --filter @fintech/portal-contracts generate
          git diff --exit-code -- \
            packages/portal-contracts/openapi \
            packages/portal-contracts/src/generated

      - name: Validate Portal Web
        run: |
          pnpm --filter @fintech/portal-web format:check
          pnpm --filter @fintech/portal-web lint
          pnpm --filter @fintech/portal-web typecheck
          pnpm --filter @fintech/portal-web test
          pnpm --filter @fintech/portal-web build

  portal-containers:
    name: Portal container security and health
    needs: portal-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and start isolated Portal
        run: docker compose --env-file .env.example up -d --build --wait portal-api portal-web

      - name: Verify non-root users and health
        run: |
          test "$(docker compose exec -T portal-api id -u)" != "0"
          test "$(docker compose exec -T portal-web id -u)" != "0"
          curl --fail --silent http://127.0.0.1:8010/health/live
          curl --fail --silent http://127.0.0.1:3000/health
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:3000/error-test)" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:3000/developer)" = "404"

      - name: Capture safe Portal diagnostics
        if: failure()
        run: docker compose logs --tail=200 portal-api portal-web

      - name: Stop Portal
        if: always()
        run: docker compose --env-file .env.example down --remove-orphans

  portal-e2e:
    name: Portal browser smoke test
    needs: portal-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: pnpm

      - name: Install Portal and browser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/portal-api[dev]"
          pnpm install --frozen-lockfile
          pnpm --filter @fintech/portal-web exec playwright install --with-deps chromium

      - name: Run Portal smoke test
        run: pnpm --filter @fintech/portal-web e2e

      - name: Upload safe browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: portal-playwright-report
          path: apps/portal-web/playwright-report
          retention-days: 7

  quality:
    name: Phase 7 quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Python formatting
        run: python -m ruff format --check .

      - name: Run unit, local batch, CDC consumer, and Silver tests with coverage
        run: >-
          python -m pytest -m "not integration or batch_integration"
          --cov=src --cov-report=term-missing --cov-report=xml

      - name: Validate YAML
        run: python -m yamllint .

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet

  minio-integration:
    name: MinIO and Silver integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start MinIO and bootstrap private buckets
        run: |
          docker compose --env-file .env.example up -d --wait minio
          docker compose --env-file .env.example up minio-init

      - name: Run MinIO integration tests
        run: |
          set -a
          source .env.example
          set +a
          RUN_MINIO_INTEGRATION=1 python -m pytest -m minio_integration

      - name: Run Silver integration tests
        run: |
          set -a
          source .env.example
          set +a
          RUN_SILVER_INTEGRATION=1 python -m pytest -m silver_integration

      - name: Stop MinIO
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans

  airflow-control-plane:
    name: Airflow DAG and control-plane integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16.4-bookworm
        env:
          POSTGRES_DB: airflow_metadata
          POSTGRES_USER: airflow_metadata
          POSTGRES_PASSWORD: ci_placeholder_airflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airflow_metadata -d airflow_metadata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      AIRFLOW_HOME: ${{ github.workspace }}/tmp/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # yamllint disable-line rule:line-length
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_metadata:ci_placeholder_airflow_password@localhost:5432/airflow_metadata
      AIRFLOW_DATABASE_HOST: localhost
      AIRFLOW_DATABASE_PORT: "5432"
      AIRFLOW_DATABASE_NAME: airflow_metadata
      AIRFLOW_DATABASE_USER: airflow_metadata
      AIRFLOW_DATABASE_PASSWORD: ci_placeholder_airflow_password
      CONTROL_DATABASE_USER: pipeline_control
      CONTROL_DATABASE_PASSWORD: ci_placeholder_control_password
      # yamllint disable-line rule:line-length
      AIRFLOW_CONN_CONTROL_DB: postgresql://pipeline_control:ci_placeholder_control_password@localhost:5432/airflow_metadata
      RUN_AIRFLOW_INTEGRATION: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned Airflow and project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "apache-airflow==3.3.0" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-3.3.0/constraints-3.11.txt"
          python -m pip install -e ".[dev]"

      - name: Initialize Airflow metadata and control schema
        run: |
          airflow db migrate
          python scripts/airflow/bootstrap_control.py

      - name: Parse and validate DAGs
        run: python -m pytest airflow/tests tests/unit/orchestration

      - name: Run control-plane integration tests
        run: python -m pytest -m airflow_integration
